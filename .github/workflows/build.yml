name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app || true
          xcodebuild -version

      - name: Install iOS Simulator Runtime
        run: |
          # actool 编译 Asset Catalog 时需要模拟器运行时来验证 universal 图标
          # 检查是否已安装，未安装则下载
          RUNTIME_ID=$(xcrun simctl list runtimes | grep -oE 'com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]+' | head -1 || true)
          if [ -z "$RUNTIME_ID" ]; then
            echo "No iOS runtime found, downloading..."
            xcodebuild -downloadPlatform iOS
          else
            echo "iOS runtime already available: $RUNTIME_ID"
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          ls -la DeepSeekUsage.xcodeproj/

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project DeepSeekUsage.xcodeproj \
            -scheme DeepSeekUsage \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/DeepSeekUsage.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            VALIDATE_PRODUCT=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/DeepSeekUsage.xcarchive/Products/Applications/DeepSeekUsage.app Payload/
          zip -r DeepSeekUsage.ipa Payload/
          ls -lh DeepSeekUsage.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekUsage.ipa
          path: DeepSeekUsage.ipa
          retention-days: 90
