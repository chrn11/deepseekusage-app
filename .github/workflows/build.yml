name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          ls -la DeepSeekUsage.xcodeproj/

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project DeepSeekUsage.xcodeproj \
            -scheme DeepSeekUsage \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/DeepSeekUsage.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/DeepSeekUsage.xcarchive/Products/Applications/DeepSeekUsage.app Payload/
          zip -r DeepSeekUsage.ipa Payload/
          ls -lh DeepSeekUsage.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekUsage.ipa
          path: DeepSeekUsage.ipa
          retention-days: 90
