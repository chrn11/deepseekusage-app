name: Build iOS IPA (TrollStore)

# ============================================================
# DeepSeek Usage Tracker — iOS 自动构建流水线
#
# 触发条件: 推送到 main 分支 或 手动触发
# 产物: 一个 unsigned .ipa，可用 TrollStore 安装
# ============================================================

on:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
      - 'project.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # 允许在 GitHub 网页上手动触发
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15       # macOS 15 带 Xcode 16.x，支持 XcodeGen 2.45+ 生成的格式

    steps:
      # ---- 步骤 1: 检出代码 ----
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      # ---- 步骤 2: 设置 Xcode ----
      - name: Select Xcode
        run: |
          echo "Available Xcodes:"
          ls /Applications/ | grep Xcode || true
          # macos-15 自带 Xcode 16.x，默认即可
          sudo xcode-select -s /Applications/Xcode_16.app || true
          xcodebuild -version
          xcodebuild -showsdks

      # ---- 步骤 3: 安装 XcodeGen ----
      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      # ---- 步骤 4: 生成 App 图标 (DeepSeek 鲸鱼) ----
      - name: Generate App Icon
        run: |
          mkdir -p ios/DeepSeekUsage/Assets.xcassets/AppIcon.appiconset

          # 下载 DeepSeek 官方鲸鱼图标
          curl -sL "https://cdn.deepseek.com/favicon.png" -o /tmp/ds_icon.png

          # 用 sips 生成 1024x1024 的图标 (Xcode 会从此自动生成所有小尺寸)
          sips -z 1024 1024 /tmp/ds_icon.png --out ios/DeepSeekUsage/Assets.xcassets/AppIcon.appiconset/icon-1024.png 2>&1 || {
            echo "sips 失败，使用原图"
            cp /tmp/ds_icon.png ios/DeepSeekUsage/Assets.xcassets/AppIcon.appiconset/icon-1024.png
          }

          # 创建 Contents.json
          cat > ios/DeepSeekUsage/Assets.xcassets/Contents.json << 'JSONEOF'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSONEOF

          cat > ios/DeepSeekUsage/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSONEOF'
          {
            "images" : [
              {
                "filename" : "icon-1024.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSONEOF

          echo "图标已生成:"
          file ios/DeepSeekUsage/Assets.xcassets/AppIcon.appiconset/icon-1024.png

      # ---- 步骤 5: 生成 Xcode 项目 ----
      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          echo "Generated project:"
          ls -la DeepSeekUsage.xcodeproj/

      # ---- 步骤 6: 编译 (Archive, 无签名) ----
      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project DeepSeekUsage.xcodeproj \
            -scheme DeepSeekUsage \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/DeepSeekUsage.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty || xcodebuild archive \
            -project DeepSeekUsage.xcodeproj \
            -scheme DeepSeekUsage \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/DeepSeekUsage.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # ---- 步骤 7: 检查 Archive 产物 ----
      - name: Verify Archive
        run: |
          echo "Archive contents:"
          ls -la ./build/DeepSeekUsage.xcarchive/Products/Applications/
          echo ""
          echo "App bundle info:"
          ls -la ./build/DeepSeekUsage.xcarchive/Products/Applications/DeepSeekUsage.app/
          echo ""
          echo "Info.plist verification:"
          /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" ./build/DeepSeekUsage.xcarchive/Products/Applications/DeepSeekUsage.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" ./build/DeepSeekUsage.xcarchive/Products/Applications/DeepSeekUsage.app/Info.plist || true

      # ---- 步骤 8: 打包为 .ipa (Payload 方式, TrollStore 兼容) ----
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/DeepSeekUsage.xcarchive/Products/Applications/DeepSeekUsage.app Payload/
          zip -r DeepSeekUsage.ipa Payload/
          rm -rf Payload
          echo ""
          echo "IPA file size:"
          ls -lh DeepSeekUsage.ipa

      # ---- 步骤 9: 上传 .ipa 为构建产物 ----
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekUsage-unsigned.ipa
          path: DeepSeekUsage.ipa
          retention-days: 90       # 90 天内可下载
          compression-level: 0     # 已经是 zip 了，不重复压缩

      # ---- 步骤 10: 上传 dSYM（可选，调试用） ----
      - name: Upload dSYM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekUsage-dSYMs
          path: ./build/DeepSeekUsage.xcarchive/dSYMs/
          retention-days: 30
        continue-on-error: true

      # ---- 步骤 11: 创建 Release (仅 push tag 时) ----
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DeepSeekUsage.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
