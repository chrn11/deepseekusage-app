# XcodeGen 项目描述文件
# GitHub Actions 使用此文件自动生成 .xcodeproj 并编译
# 你不需要 Mac 也能更新这个文件 — 修改后 push 即可触发自动构建

name: DeepSeekUsage

options:
  bundleIdPrefix: com.deepseekusage
  minimumXcodeGenVersion: "2.40"
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SUPPORTED_PLATFORMS: "iphoneos"
    TARGETED_DEVICE_FAMILY: "1"       # iPhone only
    CODE_SIGN_STYLE: "Manual"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: "NO"

targets:
  DeepSeekUsage:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ios/DeepSeekUsage
        type: group
    settings:
      base:
        INFOPLIST_FILE: ios/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.deepseekusage.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: "DeepSeekUsage"
        # ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        # iOS 16+ 不需要额外链接 Charts framework，SwiftUI Charts 内置于 SwiftUI
    preBuildScripts:
      # SwiftLint 你可以后续加上
      # - name: "SwiftLint"
      #   script: |
      #     swiftlint
